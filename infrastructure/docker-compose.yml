# Fluxora - Docker Compose (Development)
# Usage: docker compose up -d
# For production use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: fluxora

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service,environment"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  # ─── Database ──────────────────────────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: fluxora-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fluxoradb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev-password}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=${MYSQL_ROOT_PASSWORD:-dev-root-password}",
        ]
      <<: *healthcheck-defaults
      start_period: 60s
    networks:
      - backend-net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ─── Redis Cache ───────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: fluxora-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save 60 1
      - --loglevel warning
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
      start_period: 10s
    networks:
      - backend-net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: runner
      args:
        NODE_ENV: development
    image: fluxora-backend:dev
    container_name: fluxora-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      HEALTH_PORT: 8080
      METRICS_PORT: 9090
      APP_NAME: fluxora
      DATABASE_HOST: database
      DATABASE_PORT: 3306
      DATABASE_NAME: ${MYSQL_DATABASE:-fluxoradb}
      DATABASE_USER: ${MYSQL_USER:-appuser}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-dev-password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32bytes!!}
      API_KEY: ${API_KEY:-dev-api-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: json
      AUDIT_LOGGING: enabled
      COMPLIANCE_MODE: financial
      PCI_DSS_MODE: "true"
      GDPR_MODE: "true"
      SOC2_MODE: "true"
      METRICS_ENABLED: "true"
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9090:9090"
    volumes:
      - backend-logs:/app/logs
      - backend-cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      <<: *healthcheck-defaults
    networks:
      - backend-net
      - frontend-net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: runner
      args:
        REACT_APP_API_URL: /api
        REACT_APP_ENV: development
    image: fluxora-frontend:dev
    container_name: fluxora-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      REACT_APP_API_URL: /api
      REACT_APP_ENV: development
    ports:
      - "127.0.0.1:80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      <<: *healthcheck-defaults
      start_period: 20s
    networks:
      - frontend-net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run/nginx
      - /tmp/nginx

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: fluxora-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      <<: *healthcheck-defaults
    networks:
      - monitoring-net
      - backend-net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: fluxora-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      <<: *healthcheck-defaults
    networks:
      - monitoring-net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

networks:
  backend-net:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/24
  frontend-net:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.1.0/24
  monitoring-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24

volumes:
  db-data:
    driver: local
    labels:
      com.fluxora.service: database
      com.fluxora.environment: development
  redis-data:
    driver: local
    labels:
      com.fluxora.service: redis
      com.fluxora.environment: development
  backend-logs:
    driver: local
  backend-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
