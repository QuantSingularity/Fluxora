global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "fluxora-local"
    environment: "development"

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "fluxora-backend"
    static_configs:
      - targets: ["backend:9090"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "mysql-exporter"
    static_configs:
      - targets: ["mysql-exporter:9104"]
    scrape_interval: 30s

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
