# Horizontal Pod Autoscaler for Fluxora Backend

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fluxora-backend-hpa
  namespace: fluxora
  labels:
    app: fluxora-backend
    component: autoscaling
    compliance: "pci-dss,gdpr,soc2"
    tier: application
  annotations:
    fluxora.com/scaling-policy: "financial-grade"
    fluxora.com/min-availability: "99.9%"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fluxora-backend

  minReplicas: 2
  maxReplicas: 20

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

    - type: Pods
      pods:
        metric:
          name: requests_per_second
        target:
          type: AverageValue
          averageValue: "500"

    - type: Pods
      pods:
        metric:
          name: response_time_p95
        target:
          type: AverageValue
          averageValue: "200m"

    - type: Pods
      pods:
        metric:
          name: error_rate_percent
        target:
          type: AverageValue
          averageValue: "1"

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fluxora-frontend-hpa
  namespace: fluxora
  labels:
    app: fluxora-frontend
    component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fluxora-frontend

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
