# Kustomize Configuration for Environment Management

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: fluxora-base
  annotations:
    config.kubernetes.io/local-config: "true"
    fluxora.com/compliance: "pci-dss,gdpr,soc2"

resources:
  - ../kubernetes/base/namespace.yaml
  - ../kubernetes/base/rbac.yaml
  - ../kubernetes/base/network-policy.yaml
  - ../kubernetes/base/pdb.yaml
  - ../kubernetes/base/app-configmap.yaml
  - ../kubernetes/base/app-secrets.yaml
  - ../kubernetes/base/redis-pvc.yaml
  - ../kubernetes/base/backend-deployment.yaml
  - ../kubernetes/base/frontend-deployment.yaml
  - ../kubernetes/base/database-statefulset.yaml
  - ../kubernetes/base/redis-deployment.yaml
  - ../kubernetes/base/backend-service.yaml
  - ../kubernetes/base/frontend-service.yaml
  - ../kubernetes/base/database-service.yaml
  - ../kubernetes/base/redis-service.yaml
  - ../kubernetes/base/ingress.yaml
  - ../monitoring/prometheus-config.yaml
  - ../monitoring/alertmanager-config.yaml

commonLabels:
  app.kubernetes.io/name: fluxora
  app.kubernetes.io/part-of: fluxora-platform
  compliance.fluxora.com/frameworks: "pci-dss,gdpr,soc2"
  security.fluxora.com/encryption: "required"

commonAnnotations:
  fluxora.com/managed-by: "kustomize"
  fluxora.com/compliance-verified: "true"
  fluxora.com/security-scanned: "true"

namespace: fluxora

images:
  - name: registry.example.com/app/backend
    newName: ghcr.io/fluxora/backend
    newTag: latest
  - name: registry.example.com/app/frontend
    newName: ghcr.io/fluxora/frontend
    newTag: latest

configMapGenerator:
  - name: fluxora-frontend-config
    namespace: fluxora
    literals:
      - APP_NAME=fluxora
      - ENVIRONMENT=base
      - LOG_LEVEL=INFO
      - METRICS_ENABLED=true
      - AUDIT_LOGGING=true
      - COMPLIANCE_MODE=financial

patches:
  - target:
      kind: Deployment
      name: fluxora-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/securityContext/runAsNonRoot
        value: true
  - target:
      kind: StatefulSet
      name: fluxora-database
    patch: |-
      - op: replace
        path: /spec/template/spec/securityContext/runAsNonRoot
        value: true
