# Fluxora - Docker Compose Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Requires all secrets to be set via environment variables or .env.prod file

name: fluxora-prod

services:
  database:
    image: mysql:8.0
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fluxoradb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    ports: []

  redis:
    command:
      - redis-server
      - --save 60 1
      - --save 300 10
      - --loglevel warning
      - --maxmemory 512mb
      - --maxmemory-policy allkeys-lru
      - --requirepass ${REDIS_PASSWORD}
      - --bind 127.0.0.1
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.2"
          memory: 512M
    ports: []

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/fluxora/backend:production}
    build:
      target: runner
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      API_KEY: ${API_KEY}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports: []
    volumes:
      - backend-logs:/app/logs

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/fluxora/frontend:production}
    build:
      target: runner
      args:
        REACT_APP_API_URL: /api
        REACT_APP_ENV: production
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    ports: []

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: fluxora-proxy
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl-certs:/etc/nginx/ssl:ro
      - proxy-logs:/var/log/nginx
    networks:
      - frontend-net
      - backend-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  prometheus:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    ports: []

  grafana:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    ports: []
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SERVER_PROTOCOL: https

volumes:
  ssl-certs:
    driver: local
  proxy-logs:
    driver: local
