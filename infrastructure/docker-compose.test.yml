# Fluxora - Docker Compose for Integration Testing
# Usage: docker compose -f docker-compose.test.yml up --abort-on-container-exit

name: fluxora-test

services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: test-root
      MYSQL_DATABASE: fluxoradb_test
      MYSQL_USER: testuser
      MYSQL_PASSWORD: test-password
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=test-root",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - test-net
    tmpfs:
      - /var/lib/mysql

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - test-net

  backend-test:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: runner
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      DATABASE_HOST: database
      DATABASE_PORT: 3306
      DATABASE_NAME: fluxoradb_test
      DATABASE_USER: testuser
      DATABASE_PASSWORD: test-password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: test-jwt-secret
      ENCRYPTION_KEY: test-encryption-key-32bytes!!!
      LOG_LEVEL: ERROR
    command: ["npm", "test"]
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
