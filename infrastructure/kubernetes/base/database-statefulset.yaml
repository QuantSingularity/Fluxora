apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fluxora-database
  namespace: fluxora
  labels:
    app: fluxora-database
    component: database
    tier: data
spec:
  serviceName: fluxora-database
  replicas: 1
  selector:
    matchLabels:
      app: fluxora-database
  template:
    metadata:
      labels:
        app: fluxora-database
        component: database
        tier: data
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fluxora-database
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              name: mysql
              protocol: TCP
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fluxora-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: fluxoradb
            - name: MYSQL_USER
              value: appuser
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fluxora-secrets
                  key: mysql-password
          volumeMounts:
            - name: fluxora-database-data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - 'mysqladmin ping -u root -p"${MYSQL_ROOT_PASSWORD}" --silent'
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - 'mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e ''SELECT 1'' --silent'
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: fluxora-database-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
