apiVersion: v1
kind: Secret
metadata:
  name: fluxora-secrets
  namespace: fluxora
  labels:
    app: fluxora
    component: secrets
type: Opaque
stringData:
  database-url: "mysql://appuser:dev-password@fluxora-database:3306/fluxoradb"
  jwt-secret: "dev-jwt-secret"
  mysql-root-password: "dev-root-password"
  mysql-password: "dev-password"
  api-key: "dev-api-key"

---
apiVersion: v1
kind: Secret
metadata:
  name: fluxora-db-credentials
  namespace: fluxora
  labels:
    app: fluxora
    component: database-credentials
type: Opaque
stringData:
  host: "fluxora-database"
  port: "3306"
  database: "fluxoradb"
  username: "appuser"
  password: "dev-password"
  connection-string: "mysql://appuser:dev-password@fluxora-database:3306/fluxoradb"

---
apiVersion: v1
kind: Secret
metadata:
  name: fluxora-app-secrets
  namespace: fluxora
  labels:
    app: fluxora
    component: app-secrets
type: Opaque
stringData:
  jwt-secret: "dev-jwt-secret"
  encryption-key: "dev-encryption-key-32-bytes-long!"
  api-key: "dev-api-key"

---
apiVersion: v1
kind: Secret
metadata:
  name: fluxora-redis-credentials
  namespace: fluxora
  labels:
    app: fluxora
    component: redis-credentials
type: Opaque
stringData:
  host: "fluxora-redis"
  port: "6379"
  password: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: fluxora-ssl-certs
  namespace: fluxora
  labels:
    app: fluxora
    component: tls
type: kubernetes.io/tls
stringData:
  tls.crt: "REPLACE_WITH_ACTUAL_CERT"
  tls.key: "REPLACE_WITH_ACTUAL_KEY"
