apiVersion: v1
kind: Service
metadata:
  name: fluxora-backend
  namespace: fluxora
  labels:
    app: fluxora-backend
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: health
  selector:
    app: fluxora-backend
